<h1 class="sign-in-header">Για λίγους και καλούς</h1>
<form class="sign-in-form" [formGroup]="signInForm" (ngSubmit)="onSubmit()">
  <mat-form-field appearance="outline">
    <mat-label>Username</mat-label>
    <input matInput type="email" formControlName="username" />
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>Password</mat-label>
    <input matInput type="password" formControlName="password" />
  </mat-form-field>
  <button mat-raised-button type="submit" [disabled]="!signInForm.valid">
    Sign in
  </button>
</form>
